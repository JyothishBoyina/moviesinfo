<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CineWave — Premium Movie Info</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<body>
  <header class="site-header">
    <div class="container header-row">
      <a href="#/" class="brand">Movies Info</a>
      <nav class="nav">

        <a href="#/movies" class="nav-link">Movies</a>

        <input id="searchInput" placeholder="Search movies (Enter)" />

    <div id="loading" class="loading">Loading...</div>

  <footer class="site-footer">
    <div class="container">Built with TMDB API</div>

  <script src="app.js"></script>
